    <circle cx="0" cy="-8" r="10" fill="#fff" stroke="#e8702a" stroke-width="2"/>
  </g>
  <!-- batter -->
  <g transform="translate(150,150)">
    <circle cx="10" cy="-58" r="20" fill="#f2c197"/>
    <path d="M-10 -70 Q10 -86 30 -70 L32 -64 Q10 -76 -12 -64 Z" fill="#1a2b5e"/>
