<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eb3e8"/>
      <stop offset="0.6" stop-color="#8ecdf2"/>
      <stop offset="1" stop-color="#cdeafb"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3b0"/>
      <stop offset="1" stop-color="#ffd54f"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcb887"/>
      <stop offset="1" stop-color="#c99e66"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff59d" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fff59d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="net" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M0 0 L14 14 M14 0 L0 14" stroke="#7d8aa8" stroke-width="1.2"/>
    </pattern>
  </defs>

  <!-- sky -->
  <rect width="1600" height="640" fill="url(#sky)"/>

  <!-- sun: above the school roof, clear of the text -->
  <circle cx="945" cy="88" r="92" fill="url(#glow)"/>
  <circle cx="945" cy="88" r="48" fill="url(#sun)"/>

  <!-- clouds: kept to the far edges, away from the text -->
  <g fill="#ffffff" opacity="0.9">
    <g transform="translate(130,120)">
      <ellipse cx="0" cy="0" rx="56" ry="20"/>
      <ellipse cx="42" cy="-11" rx="38" ry="17"/>
    </g>
    <g transform="translate(1470,110)" opacity="0.85">
      <ellipse cx="0" cy="0" rx="48" ry="17"/>
      <ellipse cx="36" cy="-10" rx="30" ry="13"/>
    </g>
    <g transform="translate(1180,64)" opacity="0.8">
      <ellipse cx="0" cy="0" rx="36" ry="13"/>
      <ellipse cx="26" cy="-8" rx="22" ry="10"/>
    </g>
  </g>

  <!-- birds: high on the right, off the text -->
  <g stroke="#3d6f96" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M1060 140 q9 -9 18 0 q9 -9 18 0"/>
    <path d="M1120 118 q7 -7 14 0 q7 -7 14 0"/>
  </g>

  <!-- school building: a bit smaller, no clock -->
  <g>
    <rect x="856" y="262" width="360" height="186" fill="#f4efe6"/>
    <rect x="856" y="262" width="360" height="11" fill="#d8d2c4"/>
    <!-- rooftop fence -->
    <g stroke="#9aa4b5" stroke-width="2.5">
      <path d="M856 254 L1216 254"/>
      <path d="M866 254 L866 262"/><path d="M901 254 L901 262"/><path d="M936 254 L936 262"/>
      <path d="M971 254 L971 262"/><path d="M1006 254 L1006 262"/><path d="M1041 254 L1041 262"/>
      <path d="M1076 254 L1076 262"/><path d="M1111 254 L1111 262"/><path d="M1146 254 L1146 262"/>
      <path d="M1181 254 L1181 262"/><path d="M1206 254 L1206 262"/>
    </g>
    <!-- windows: 3 floors -->
    <g fill="#a8d4ee" stroke="#8fb6cf" stroke-width="1.6">
      <rect x="874" y="284" width="40" height="28" rx="2"/><rect x="926" y="284" width="40" height="28" rx="2"/>
      <rect x="978" y="284" width="40" height="28" rx="2"/><rect x="1082" y="284" width="40" height="28" rx="2"/>
      <rect x="1134" y="284" width="40" height="28" rx="2"/><rect x="1186" y="284" width="22" height="28" rx="2"/>
      <rect x="874" y="328" width="40" height="28" rx="2"/><rect x="926" y="328" width="40" height="28" rx="2"/>
      <rect x="978" y="328" width="40" height="28" rx="2"/><rect x="1082" y="328" width="40" height="28" rx="2"/>
      <rect x="1134" y="328" width="40" height="28" rx="2"/><rect x="1186" y="328" width="22" height="28" rx="2"/>
      <rect x="874" y="372" width="40" height="28" rx="2"/><rect x="926" y="372" width="40" height="28" rx="2"/>
      <rect x="978" y="372" width="40" height="28" rx="2"/><rect x="1082" y="372" width="40" height="28" rx="2"/>
      <rect x="1134" y="372" width="40" height="28" rx="2"/><rect x="1186" y="372" width="22" height="28" rx="2"/>
    </g>
    <!-- entrance -->
    <rect x="1028" y="398" width="46" height="50" fill="#c9d6e4" stroke="#8fb6cf" stroke-width="1.6"/>
    <path d="M1051 398 L1051 448" stroke="#8fb6cf" stroke-width="1.6"/>
  </g>

  <!-- trees -->
  <g>
    <g transform="translate(1330,420)">
      <rect x="-7" y="0" width="14" height="34" fill="#7a5230"/>
      <circle cx="0" cy="-22" r="38" fill="#3c8c46"/>
      <circle cx="-24" cy="-4" r="24" fill="#43a047"/>
      <circle cx="24" cy="-4" r="24" fill="#2e7d32"/>
    </g>
    <g transform="translate(210,430)">
      <rect x="-7" y="0" width="14" height="30" fill="#7a5230"/>
      <circle cx="0" cy="-20" r="36" fill="#3c8c46"/>
      <circle cx="22" cy="-2" r="22" fill="#43a047"/>
    </g>
  </g>

  <!-- backstop net: small, behind the batter -->
  <g>
    <path d="M580 330 L580 470 L716 470 L716 388 Q652 330 580 330 Z" fill="url(#net)" opacity="0.4"/>
    <path d="M580 330 L580 470 M716 388 L716 470 M580 330 Q652 330 716 388" fill="none" stroke="#5d6b8c" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
    <path d="M580 470 L716 470" stroke="#5d6b8c" stroke-width="5" opacity="0.75"/>
  </g>

  <!-- schoolyard dirt ground -->
  <path d="M0 452 Q 400 434 800 444 T 1600 448 L1600 640 L0 640 Z" fill="url(#ground)"/>
  <!-- grass edge along building -->
  <path d="M780 452 Q 1150 438 1600 446 L1600 470 Q 1150 462 780 474 Z" fill="#4aa64f"/>

  <!-- field lines -->
  <path d="M800 640 L560 585 L800 535 L1040 585 Z" fill="none" stroke="#fff" stroke-width="5" opacity="0.95"/>
  <rect x="548" y="578" width="18" height="14" fill="#fff" transform="rotate(-8 557 585)"/>
  <rect x="791" y="528" width="18" height="14" fill="#fff"/>
  <rect x="1034" y="578" width="18" height="14" fill="#fff" transform="rotate(8 1043 585)"/>
  <circle cx="800" cy="586" r="26" fill="#bd7c47"/>
  <!-- home plate -->
  <path d="M786 612 L814 612 L814 622 L800 632 L786 622 Z" fill="#fff" stroke="#d9d9d9" stroke-width="1"/>

  <!-- kids: tightly clustered around the center so phones show all three -->
  <!-- batter -->
  <g transform="translate(700,472)">
    <circle cx="0" cy="-58" r="15" fill="#f2c197"/>
    <path d="M-15 -66 Q0 -80 15 -66 L17 -60 Q0 -72 -17 -60 Z" fill="#1a2b5e"/>
    <path d="M-11 -68 Q0 -82 11 -68 Q5 -75 0 -75 Q-5 -75 -11 -68 Z" fill="#1a2b5e"/>
    <path d="M-11 -45 Q0 -39 11 -45 L14 -6 Q0 2 -14 -6 Z" fill="#fdfdf8"/>
    <path d="M-11 -45 L-12 -22 L-6 -22 L-6 -43 Z" fill="#f57c00"/>
    <path d="M-12 -8 L-20 34 L-12 36 L-2 4 L6 36 L14 34 L8 -8 Z" fill="#1a2b5e"/>
    <path d="M8 -40 L46 -72 L52 -66 L14 -32 Z" fill="#f2c197"/>
    <g transform="rotate(-40 55 -75)"><rect x="42" y="-80" width="30" height="10" rx="5" fill="#c98a3f"/></g>
  </g>
  <!-- pitcher -->
  <g transform="translate(815,432)">
    <circle cx="0" cy="-54" r="14" fill="#e8b083"/>
    <path d="M-14 -62 Q0 -76 14 -62 L16 -56 Q0 -68 -16 -56 Z" fill="#1a2b5e"/>
    <path d="M-10 -64 Q0 -78 10 -64 Q5 -71 0 -71 Q-5 -71 -10 -64 Z" fill="#1a2b5e"/>
    <path d="M-10 -42 Q0 -36 10 -42 L12 -6 Q0 1 -12 -6 Z" fill="#fdfdf8"/>
    <path d="M-10 -7 L-24 30 L-16 33 L-2 3 L10 32 L18 29 L9 -7 Z" fill="#1a2b5e"/>
    <path d="M7 -38 L34 -60 L39 -53 L11 -30 Z" fill="#e8b083"/>
    <circle cx="38" cy="-60" r="6" fill="#fff" stroke="#e8702a" stroke-width="1.5"/>
  </g>
  <!-- fielder -->
  <g transform="translate(920,478)">
    <circle cx="0" cy="-50" r="14" fill="#f2c197"/>
    <path d="M-14 -58 Q0 -72 14 -58 L16 -52 Q0 -64 -16 -52 Z" fill="#1a2b5e"/>
    <path d="M-10 -60 Q0 -74 10 -60 Q5 -67 0 -67 Q-5 -67 -10 -60 Z" fill="#1a2b5e"/>
    <path d="M-10 -38 Q0 -32 10 -38 L11 -4 Q0 2 -11 -4 Z" fill="#fdfdf8"/>
    <path d="M-9 -5 L-16 28 L-8 30 L0 4 L8 30 L16 28 L9 -5 Z" fill="#1a2b5e"/>
    <path d="M-8 -34 L-32 -22 L-29 -14 L-6 -26 Z" fill="#f2c197"/>
    <circle cx="-33" cy="-20" r="9" fill="#b06a3b"/>
    <path d="M8 -34 L30 -44 L34 -37 L11 -26 Z" fill="#f2c197"/>
  </g>
</svg>
