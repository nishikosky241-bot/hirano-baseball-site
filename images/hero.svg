<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eb3e8"/>
      <stop offset="0.6" stop-color="#8ecdf2"/>
      <stop offset="1" stop-color="#cdeafb"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3b0"/>
      <stop offset="1" stop-color="#ffd54f"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcb887"/>
      <stop offset="1" stop-color="#c99e66"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff59d" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#fff59d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="net" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M0 0 L14 14 M14 0 L0 14" stroke="#7d8aa8" stroke-width="1.2"/>
    </pattern>
  </defs>

  <!-- sky -->
  <rect width="1600" height="640" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="240" cy="110" r="130" fill="url(#glow)"/>
  <circle cx="240" cy="110" r="66" fill="url(#sun)"/>

  <!-- clouds -->
  <g fill="#ffffff" opacity="0.95">
    <g transform="translate(640,90)">
      <ellipse cx="0" cy="0" rx="62" ry="22"/>
      <ellipse cx="46" cy="-12" rx="42" ry="19"/>
      <ellipse cx="-50" cy="-7" rx="38" ry="16"/>
    </g>
    <g transform="translate(1000,60)" opacity="0.85">
      <ellipse cx="0" cy="0" rx="48" ry="17"/>
      <ellipse cx="36" cy="-10" rx="30" ry="13"/>
    </g>
  </g>

  <!-- birds -->
  <g stroke="#3d6f96" stroke-width="3.5" fill="none" stroke-linecap="round">
    <path d="M760 150 q10 -10 20 0 q10 -10 20 0"/>
    <path d="M830 122 q8 -8 16 0 q8 -8 16 0"/>
  </g>

  <!-- school building (平野小学校) -->
  <g>
    <!-- main building -->
    <rect x="1010" y="196" width="520" height="250" fill="#f4efe6"/>
    <rect x="1010" y="196" width="520" height="14" fill="#d8d2c4"/>
    <!-- rooftop fence -->
    <g stroke="#9aa4b5" stroke-width="3">
      <path d="M1010 186 L1530 186"/>
      <path d="M1020 186 L1020 196"/><path d="M1060 186 L1060 196"/><path d="M1100 186 L1100 196"/>
      <path d="M1140 186 L1140 196"/><path d="M1180 186 L1180 196"/><path d="M1220 186 L1220 196"/>
      <path d="M1260 186 L1260 196"/><path d="M1300 186 L1300 196"/><path d="M1340 186 L1340 196"/>
      <path d="M1380 186 L1380 196"/><path d="M1420 186 L1420 196"/><path d="M1460 186 L1460 196"/>
      <path d="M1500 186 L1500 196"/>
    </g>
    <!-- clock -->
    <circle cx="1270" cy="238" r="26" fill="#fff" stroke="#1a2b5e" stroke-width="5"/>
    <path d="M1270 238 L1270 222" stroke="#1a2b5e" stroke-width="4" stroke-linecap="round"/>
    <path d="M1270 238 L1282 244" stroke="#1a2b5e" stroke-width="4" stroke-linecap="round"/>
    <!-- windows: 3 floors -->
    <g fill="#a8d4ee" stroke="#8fb6cf" stroke-width="2">
      <rect x="1034" y="272" width="52" height="38" rx="2"/><rect x="1102" y="272" width="52" height="38" rx="2"/>
      <rect x="1170" y="272" width="52" height="38" rx="2"/><rect x="1310" y="272" width="52" height="38" rx="2"/>
      <rect x="1378" y="272" width="52" height="38" rx="2"/><rect x="1446" y="272" width="52" height="38" rx="2"/>
      <rect x="1034" y="330" width="52" height="38" rx="2"/><rect x="1102" y="330" width="52" height="38" rx="2"/>
      <rect x="1170" y="330" width="52" height="38" rx="2"/><rect x="1310" y="330" width="52" height="38" rx="2"/>
      <rect x="1378" y="330" width="52" height="38" rx="2"/><rect x="1446" y="330" width="52" height="38" rx="2"/>
      <rect x="1034" y="388" width="52" height="38" rx="2"/><rect x="1102" y="388" width="52" height="38" rx="2"/>
      <rect x="1170" y="388" width="52" height="38" rx="2"/><rect x="1310" y="388" width="52" height="38" rx="2"/>
      <rect x="1378" y="388" width="52" height="38" rx="2"/><rect x="1446" y="388" width="52" height="38" rx="2"/>
    </g>
    <!-- entrance -->
    <rect x="1240" y="384" width="60" height="62" fill="#c9d6e4" stroke="#8fb6cf" stroke-width="2"/>
    <path d="M1270 384 L1270 446" stroke="#8fb6cf" stroke-width="2"/>
    <!-- school name plate -->
    <rect x="1180" y="150" width="180" height="30" rx="6" fill="#1a2b5e"/>
    <text x="1270" y="172" font-family="'Hiragino Kaku Gothic ProN', sans-serif" font-size="19" font-weight="bold" fill="#fff" text-anchor="middle">平野小学校</text>
  </g>

  <!-- trees along the fence -->
  <g>
    <g transform="translate(940,420)">
      <rect x="-7" y="0" width="14" height="34" fill="#7a5230"/>
      <circle cx="0" cy="-22" r="40" fill="#3c8c46"/>
      <circle cx="-26" cy="-4" r="26" fill="#43a047"/>
      <circle cx="26" cy="-4" r="26" fill="#2e7d32"/>
    </g>
    <g transform="translate(1560,430)">
      <rect x="-7" y="0" width="14" height="30" fill="#7a5230"/>
      <circle cx="0" cy="-20" r="36" fill="#3c8c46"/>
      <circle cx="-22" cy="-2" r="22" fill="#43a047"/>
    </g>
  </g>

  <!-- backstop net (バックネット) on the left -->
  <g>
    <path d="M60 180 L60 470 L330 470 L330 300 Q200 180 60 180 Z" fill="url(#net)" opacity="0.65"/>
    <path d="M60 180 L60 470 M330 300 L330 470 M60 180 Q200 180 330 300" fill="none" stroke="#5d6b8c" stroke-width="7" stroke-linecap="round"/>
    <path d="M60 470 L330 470" stroke="#5d6b8c" stroke-width="7"/>
  </g>

  <!-- schoolyard dirt ground -->
  <path d="M0 452 Q 400 434 800 444 T 1600 448 L1600 640 L0 640 Z" fill="url(#ground)"/>
  <!-- grass edge along building -->
  <path d="M900 452 Q 1250 438 1600 446 L1600 470 Q 1250 462 900 474 Z" fill="#4aa64f"/>

  <!-- field lines -->
  <path d="M800 640 L560 585 L800 535 L1040 585 Z" fill="none" stroke="#fff" stroke-width="5" opacity="0.95"/>
  <rect x="548" y="578" width="18" height="14" fill="#fff" transform="rotate(-8 557 585)"/>
  <rect x="791" y="528" width="18" height="14" fill="#fff"/>
  <rect x="1034" y="578" width="18" height="14" fill="#fff" transform="rotate(8 1043 585)"/>
  <circle cx="800" cy="586" r="26" fill="#bd7c47"/>
  <!-- white circle line like school ground -->
  <path d="M430 620 Q 800 560 1170 620" fill="none" stroke="#fff" stroke-width="4" opacity="0.5"/>

  <!-- kids in uniform -->
  <!-- batter -->
  <g transform="translate(430,455)">
    <circle cx="0" cy="-58" r="15" fill="#f2c197"/>
    <path d="M-15 -66 Q0 -80 15 -66 L17 -60 Q0 -72 -17 -60 Z" fill="#1a2b5e"/>
    <path d="M-11 -68 Q0 -82 11 -68 Q5 -75 0 -75 Q-5 -75 -11 -68 Z" fill="#1a2b5e"/>
    <path d="M-11 -45 Q0 -39 11 -45 L14 -6 Q0 2 -14 -6 Z" fill="#fdfdf8"/>
    <path d="M-11 -45 L-12 -22 L-6 -22 L-6 -43 Z" fill="#f57c00"/>
    <path d="M-12 -8 L-20 34 L-12 36 L-2 4 L6 36 L14 34 L8 -8 Z" fill="#1a2b5e"/>
    <path d="M8 -40 L46 -72 L52 -66 L14 -32 Z" fill="#f2c197"/>
    <g transform="rotate(-40 55 -75)"><rect x="42" y="-80" width="30" height="10" rx="5" fill="#c98a3f"/></g>
  </g>
  <!-- pitcher -->
  <g transform="translate(800,430)">
    <circle cx="0" cy="-54" r="14" fill="#e8b083"/>
    <path d="M-14 -62 Q0 -76 14 -62 L16 -56 Q0 -68 -16 -56 Z" fill="#1a2b5e"/>
    <path d="M-10 -64 Q0 -78 10 -64 Q5 -71 0 -71 Q-5 -71 -10 -64 Z" fill="#1a2b5e"/>
    <path d="M-10 -42 Q0 -36 10 -42 L12 -6 Q0 1 -12 -6 Z" fill="#fdfdf8"/>
    <path d="M-10 -7 L-24 30 L-16 33 L-2 3 L10 32 L18 29 L9 -7 Z" fill="#1a2b5e"/>
    <path d="M7 -38 L34 -60 L39 -53 L11 -30 Z" fill="#e8b083"/>
    <circle cx="38" cy="-60" r="6" fill="#fff" stroke="#e8702a" stroke-width="1.5"/>
  </g>
  <!-- fielder -->
  <g transform="translate(1130,480)">
    <circle cx="0" cy="-50" r="14" fill="#f2c197"/>
    <path d="M-14 -58 Q0 -72 14 -58 L16 -52 Q0 -64 -16 -52 Z" fill="#1a2b5e"/>
    <path d="M-10 -60 Q0 -74 10 -60 Q5 -67 0 -67 Q-5 -67 -10 -60 Z" fill="#1a2b5e"/>
    <path d="M-10 -38 Q0 -32 10 -38 L11 -4 Q0 2 -11 -4 Z" fill="#fdfdf8"/>
    <path d="M-9 -5 L-16 28 L-8 30 L0 4 L8 30 L16 28 L9 -5 Z" fill="#1a2b5e"/>
    <path d="M-8 -34 L-32 -22 L-29 -14 L-6 -26 Z" fill="#f2c197"/>
    <circle cx="-33" cy="-20" r="9" fill="#b06a3b"/>
    <path d="M8 -34 L30 -44 L34 -37 L11 -26 Z" fill="#f2c197"/>
  </g>
</svg>
