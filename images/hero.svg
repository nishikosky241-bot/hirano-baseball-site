<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2c52"/>
      <stop offset="0.45" stop-color="#4c3a68"/>
      <stop offset="0.75" stop-color="#c96a35"/>
      <stop offset="1" stop-color="#f2a94f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0b8"/>
      <stop offset="1" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c08a52"/>
      <stop offset="1" stop-color="#8f5f33"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd88a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffd88a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="net" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M0 0 L14 14 M14 0 L0 14" stroke="#5a4a63" stroke-width="1.2"/>
    </pattern>
  </defs>

  <!-- dusk sky -->
  <rect width="1600" height="640" fill="url(#sky)"/>

  <!-- stars in the upper sky -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="180" cy="60" r="2"/><circle cx="420" cy="40" r="1.5"/>
    <circle cx="700" cy="66" r="1.6"/><circle cx="1240" cy="46" r="2"/>
    <circle cx="1460" cy="86" r="1.5"/><circle cx="300" cy="110" r="1.4"/>
  </g>

  <!-- golden sun above the school roof -->
  <circle cx="945" cy="120" r="110" fill="url(#glow)"/>
  <circle cx="945" cy="120" r="50" fill="url(#sun)"/>

  <!-- warm clouds at the far edges -->
  <g fill="#f6c68e" opacity="0.85">
    <g transform="translate(130,130)">
      <ellipse cx="0" cy="0" rx="56" ry="18"/>
      <ellipse cx="42" cy="-10" rx="38" ry="15"/>
    </g>
    <g transform="translate(1470,120)" opacity="0.8">
      <ellipse cx="0" cy="0" rx="48" ry="15"/>
      <ellipse cx="36" cy="-9" rx="30" ry="12"/>
    </g>
    <g transform="translate(1180,72)" opacity="0.7">
      <ellipse cx="0" cy="0" rx="34" ry="11"/>
      <ellipse cx="24" cy="-7" rx="20" ry="9"/>
    </g>
  </g>

  <!-- birds heading home -->
  <g stroke="#2b2436" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M1060 150 q9 -9 18 0 q9 -9 18 0"/>
    <path d="M1120 128 q7 -7 14 0 q7 -7 14 0"/>
  </g>

  <!-- school building at dusk, windows lit -->
  <g>
    <rect x="856" y="262" width="360" height="186" fill="#a68d74"/>
    <rect x="856" y="262" width="360" height="11" fill="#7d6752"/>
    <!-- rooftop fence -->
    <g stroke="#6b5a49" stroke-width="2.5">
      <path d="M856 254 L1216 254"/>
      <path d="M866 254 L866 262"/><path d="M901 254 L901 262"/><path d="M936 254 L936 262"/>
      <path d="M971 254 L971 262"/><path d="M1006 254 L1006 262"/><path d="M1041 254 L1041 262"/>
      <path d="M1076 254 L1076 262"/><path d="M1111 254 L1111 262"/><path d="M1146 254 L1146 262"/>
      <path d="M1181 254 L1181 262"/><path d="M1206 254 L1206 262"/>
    </g>
    <!-- windows: warm lights -->
    <g fill="#ffd98c" stroke="#c9a25c" stroke-width="1.4">
      <rect x="874" y="284" width="40" height="28" rx="2"/><rect x="926" y="284" width="40" height="28" rx="2"/>
      <rect x="978" y="284" width="40" height="28" rx="2"/><rect x="1082" y="284" width="40" height="28" rx="2"/>
      <rect x="1134" y="284" width="40" height="28" rx="2"/><rect x="1186" y="284" width="22" height="28" rx="2"/>
      <rect x="874" y="328" width="40" height="28" rx="2"/><rect x="926" y="328" width="40" height="28" rx="2"/>
      <rect x="978" y="328" width="40" height="28" rx="2"/><rect x="1082" y="328" width="40" height="28" rx="2"/>
      <rect x="1134" y="328" width="40" height="28" rx="2"/><rect x="1186" y="328" width="22" height="28" rx="2"/>
      <rect x="874" y="372" width="40" height="28" rx="2"/><rect x="926" y="372" width="40" height="28" rx="2"/>
      <rect x="978" y="372" width="40" height="28" rx="2"/><rect x="1082" y="372" width="40" height="28" rx="2"/>
      <rect x="1134" y="372" width="40" height="28" rx="2"/><rect x="1186" y="372" width="22" height="28" rx="2"/>
    </g>
    <!-- entrance -->
    <rect x="1028" y="398" width="46" height="50" fill="#8d7659" stroke="#6b5a49" stroke-width="1.6"/>
    <path d="M1051 398 L1051 448" stroke="#6b5a49" stroke-width="1.6"/>
  </g>

  <!-- trees in dusk tones -->
  <g>
    <g transform="translate(1330,420)">
      <rect x="-7" y="0" width="14" height="34" fill="#4d3a26"/>
      <circle cx="0" cy="-22" r="38" fill="#2e5136"/>
      <circle cx="-24" cy="-4" r="24" fill="#38603f"/>
      <circle cx="24" cy="-4" r="24" fill="#264430"/>
    </g>
    <g transform="translate(210,430)">
      <rect x="-7" y="0" width="14" height="30" fill="#4d3a26"/>
      <circle cx="0" cy="-20" r="36" fill="#2e5136"/>
      <circle cx="22" cy="-2" r="22" fill="#38603f"/>
    </g>
  </g>

  <!-- backstop net: small, behind the batter -->
  <g>
    <path d="M580 330 L580 470 L716 470 L716 388 Q652 330 580 330 Z" fill="url(#net)" opacity="0.45"/>
    <path d="M580 330 L580 470 M716 388 L716 470 M580 330 Q652 330 716 388" fill="none" stroke="#453a52" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <path d="M580 470 L716 470" stroke="#453a52" stroke-width="5" opacity="0.8"/>
  </g>

  <!-- schoolyard dirt ground in warm light -->
  <path d="M0 452 Q 400 434 800 444 T 1600 448 L1600 640 L0 640 Z" fill="url(#ground)"/>
  <!-- grass edge along building -->
  <path d="M780 452 Q 1150 438 1600 446 L1600 470 Q 1150 462 780 474 Z" fill="#3e6b40"/>

  <!-- field lines -->
  <path d="M800 640 L560 585 L800 535 L1040 585 Z" fill="none" stroke="#ffe9c4" stroke-width="5" opacity="0.95"/>
  <rect x="548" y="578" width="18" height="14" fill="#ffe9c4" transform="rotate(-8 557 585)"/>
  <rect x="791" y="528" width="18" height="14" fill="#ffe9c4"/>
  <rect x="1034" y="578" width="18" height="14" fill="#ffe9c4" transform="rotate(8 1043 585)"/>
  <circle cx="800" cy="586" r="26" fill="#a06a3a"/>
  <!-- home plate -->
  <path d="M786 612 L814 612 L814 622 L800 632 L786 622 Z" fill="#ffe9c4" stroke="#c9a25c" stroke-width="1"/>

  <!-- kids: tightly clustered around the center -->
  <!-- batter -->
  <g transform="translate(700,472)">
    <circle cx="0" cy="-58" r="15" fill="#e8b083"/>
    <path d="M-15 -66 Q0 -80 15 -66 L17 -60 Q0 -72 -17 -60 Z" fill="#12233f"/>
    <path d="M-11 -68 Q0 -82 11 -68 Q5 -75 0 -75 Q-5 -75 -11 -68 Z" fill="#12233f"/>
    <path d="M-11 -45 Q0 -39 11 -45 L14 -6 Q0 2 -14 -6 Z" fill="#f5ead3"/>
    <path d="M-11 -45 L-12 -22 L-6 -22 L-6 -43 Z" fill="#c9a545"/>
    <path d="M-12 -8 L-20 34 L-12 36 L-2 4 L6 36 L14 34 L8 -8 Z" fill="#12233f"/>
    <path d="M8 -40 L46 -72 L52 -66 L14 -32 Z" fill="#e8b083"/>
    <g transform="rotate(-40 55 -75)"><rect x="42" y="-80" width="30" height="10" rx="5" fill="#a8752f"/></g>
  </g>
  <!-- pitcher -->
  <g transform="translate(815,432)">
    <circle cx="0" cy="-54" r="14" fill="#d99f70"/>
    <path d="M-14 -62 Q0 -76 14 -62 L16 -56 Q0 -68 -16 -56 Z" fill="#12233f"/>
    <path d="M-10 -64 Q0 -78 10 -64 Q5 -71 0 -71 Q-5 -71 -10 -64 Z" fill="#12233f"/>
    <path d="M-10 -42 Q0 -36 10 -42 L12 -6 Q0 1 -12 -6 Z" fill="#f5ead3"/>
    <path d="M-10 -7 L-24 30 L-16 33 L-2 3 L10 32 L18 29 L9 -7 Z" fill="#12233f"/>
    <path d="M7 -38 L34 -60 L39 -53 L11 -30 Z" fill="#d99f70"/>
    <circle cx="38" cy="-60" r="6" fill="#fff5df" stroke="#c9822f" stroke-width="1.5"/>
  </g>
  <!-- fielder -->
  <g transform="translate(920,478)">
    <circle cx="0" cy="-50" r="14" fill="#e8b083"/>
    <path d="M-14 -58 Q0 -72 14 -58 L16 -52 Q0 -64 -16 -52 Z" fill="#12233f"/>
    <path d="M-10 -60 Q0 -74 10 -60 Q5 -67 0 -67 Q-5 -67 -10 -60 Z" fill="#12233f"/>
    <path d="M-10 -38 Q0 -32 10 -38 L11 -4 Q0 2 -11 -4 Z" fill="#f5ead3"/>
    <path d="M-9 -5 L-16 28 L-8 30 L0 4 L8 30 L16 28 L9 -5 Z" fill="#12233f"/>
    <path d="M-8 -34 L-32 -22 L-29 -14 L-6 -26 Z" fill="#e8b083"/>
    <circle cx="-33" cy="-20" r="9" fill="#8f5a2e"/>
    <path d="M8 -34 L30 -44 L34 -37 L11 -26 Z" fill="#e8b083"/>
  </g>
</svg>
